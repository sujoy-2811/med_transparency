<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1B4965"/>

  <!-- Medical cross — vertical arm -->
  <rect x="13" y="5" width="6" height="22" rx="1.5" fill="white"/>

  <!-- Medical cross — horizontal arm -->
  <rect x="5" y="13" width="22" height="6" rx="1.5" fill="white"/>

  <!-- ECG / heartbeat line in amber -->
  <polyline
    points="5,16 10,16 12,10 14,22 16,16 20,16 21,13 22,16 27,16"
    fill="none"
    stroke="#E8A838"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
